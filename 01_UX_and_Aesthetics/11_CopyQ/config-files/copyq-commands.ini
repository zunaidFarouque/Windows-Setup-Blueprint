4\Name=Sort
4\Command="copyq:\n// When selecting single item, sort the entire tab\n// When selecting multiple items, only sort the selected items\n\nvar sort_top_pinned = true \n\nvar date_reverse = {\n    [mimeText]: 'Latest First',\n    [mimeIcon]: '',\n    format: \"application/x-copyq-user-time\",\n    reverse: true\n}\n\nvar date = {\n    [mimeText]: 'Oldest First',\n    [mimeIcon]: '',\n    format: \"application/x-copyq-user-time\",\n    reverse: false\n}\n\nvar pinned = {\n    [mimeText]: 'Pinned to the top',\n    [mimeIcon]: '',\n    format: \"application/x-copyq-item-pinned\",\n    reverse: false\n}\n\nvar alphabet = {\n    [mimeText]: 'Alphabetical',\n    [mimeIcon]: '',\n    format: mimeText,\n    reverse: false\n}\nvar alphabet_reverse = {\n    [mimeText]: 'Alphabetical reverse',\n    [mimeIcon]: '',\n    format: mimeText,\n    reverse: true\n}\n\nvar size_reverse = {\n    [mimeText]: 'Biggest First',\n    [mimeIcon]: '',\n    format: \"ItemSize\",\n    reverse: true\n}\n\nvar size = {\n    [mimeText]: 'Smallest First',\n    [mimeIcon]: '',\n    format: \"ItemSize\",\n    reverse: false\n}\n\n// sorting menu list\nvar sorts = [\n    date_reverse,\n    date,\n    pinned,\n    alphabet,\n    alphabet_reverse,\n    size_reverse,\n    size\n]\n// Show menu\nvar selectedIndex = menuItems(sorts)\n\nvar sel = ItemSelection().current()\nif (sel.length <= 1) {\n    if (length() <=1 ) abort()\n    // When only one item is selected, the selection is set to the entire tab\n    tab(selectedTab())\n    sel = ItemSelection().selectAll()\n    if (sort_top_pinned) handle_pinned(sel.length)\n} else {\n    // Check if the selection starts from row 0.\n    // Yes: Process pinned items; No: No operation.\n    if (sel.rows()[0] == 0 && sort_top_pinned) {\n        handle_pinned(sel.length)\n    }\n}\n\nconst rows = sel.rows()\nvar order = ''\nif (selectedIndex != -1) {\n    // Get the selected sort by\n    const selectedFormat = sorts[selectedIndex].format\n    switch (selectedFormat) {\n        case 'ItemSize':\n            // When sorting by item size, it takes ~3ms to calculate the size of each item\n            popup('Sorting ⏳', '', rows.length * 3)\n            order = sizeList()\n            break;\n        case \"application/x-copyq-item-pinned\":\n            order = sel.itemsFormat(selectedFormat).map((item) => item === undefined);\n            break;\n        default:\n            order = sel.itemsFormat(selectedFormat)\n    }\n} else {\n    abort()\n}\n\n// sorting\nif (sorts[selectedIndex].reverse) {\n    sel.sort((i, j) => order[i] > order[j]);\n} else {\n    sel.sort((i, j) => order[i] < order[j]);\n}\npopup('Sorting completed✅', '', 1000)\n\n// Obtain the byte size of each item in the sel selection\nfunction sizeList() {\n    var items = sel.items()\n    var sizes = []\n    for (let row in rows) {\n        var itemSize = 0\n        var item = items[row]\n        for (var format in item) {\n            itemSize += read(format, row).size()\n        }\n        sizes.push(itemSize)\n    }\n    return sizes\n}\n\n// The first pinned item on the top of the tab can not be sorted\n// so need to move the continuous pinned items down n+1 rows\nfunction handle_pinned(sel_length) {\n    var pinned = []\n    // Get continuous pinned items starting from row 0\n    for (var i = 0; i < sel_length; i++) {\n        if (plugins.itempinned.isPinned(i)) {\n            pinned.push(i)\n        } else {\n            break\n        }\n    }\n    if (0 < pinned.length < sel_length) {\n        var selAll = ItemSelection().selectAll()\n        selAll.deselectIndexes(pinned)\n        selAll.invert().move(pinned.length + 1)\n    }\n}"
5\Name=Snippets
5\Command="// Snippets\n// Shows dialog with snippets to paste.\n// \n// Snippets are loaded from \"Snippets\" tab. Item notes are used as snippet name.\n// \n// Items can contain placeholders like:\n// \n// ${Name} (default text is empty),\n// ${Name:value} (default text is \"value\"),\n// ${Name:value1,value2,value3} (default text is \"value1\"; allows to select from multiple values),\n// ${Name:\\n} (multi-line text field).\n// When such snippet is selected, user is prompted to replace these placeholders with custom content.\n// \n// To create your first snippet:\n// \n// create \"Snippets\" tab (Ctrl+T),\n// \n// add new item (Ctrl+N) with a snippet:\n// \n// You picked ${Fruit:apples,oranges,pears}!\n// \n// set optional snippet name (Ctrl+F2), e.g. \"Fruit\".\n// \n// Triggering the Snippets command (with a global shortcut) will show a simple dialog where you can pick the snippet by its name.\n// \n// To pick different tab name, you have to change the command's code.\n// \n// var snippetsTabName = '&Snippets'\n\n\ncopyq:\nvar snippetsTabName = 'Snippets'\n// List snippets instead of search combo box?\nvar listSnippets = false\n\nfunction newVarRe(content) {\n  return new RegExp('\\\\${' + content + '}', 'g')\n}\n\nfunction getText(item, format) {\n  return str(item[format] || '')\n}\n\nfunction assignPlaceholder(snippet, placeholder, value) {\n  return snippet.replace(newVarRe(placeholder + ':?.*?'), value)\n}\n\nfunction fuzzyIndexOf(snippetNames, snippetName) {\n    var re = new RegExp(snippetName, 'i')\n    for (var i in snippetNames) {\n      if (snippetNames[i].match(re))\n        return i;\n    }\n    return -1\n}\n\nfunction loadSnippets(snippetNames, snippets)\n{\n  var tabs = tab()\n  for (var i in tabs) {\n    var tabName = tabs[i];\n    if (tabName != snippetsTabName && tabName.indexOf(snippetsTabName + '/') != 0)\n      continue;\n\n    tab(tabName)\n    var prefix = tabName.substring(snippetsTabName.length + 1)\n    if (prefix)\n      prefix += ': '\n    for (var j = 0; j < size(); ++j) {\n      var snippet = getitem(j)\n      var snippetName = getText(snippet, mimeItemNotes)\n          || getText(snippet, mimeText)\n          || getText(snippet, mimeHtml)\n      snippetNames.push(prefix + snippetName)\n      snippets.push(snippet)\n    }\n  }\n}\n\nfunction askForSnippet(snippetNames, snippets) {\n  var list = listSnippets ? '.list:' : ''\n\n  var settingsPrefix = 'snippets/'\n\n  var optSnippet = 'Snippet'\n  var snippetName = settings(settingsPrefix + optSnippet)\n\n  var snippet = dialog(\n    '.title', 'Select Snippet',\n    '.defaultChoice', snippetName,\n    list + optSnippet, snippetNames\n  )\n\n  if (snippet === undefined) {\n    abort()\n  }\n\n  settings(settingsPrefix + optSnippet, listSnippets ? snippetNames[snippet] : snippet)\n\n  if (listSnippets)\n      return snippets[snippet]\n\n  var i = snippetNames.indexOf(snippet)\n  if (i != -1)\n    return snippets[i]\n\n  i = fuzzyIndexOf(snippetNames, snippet)\n  if (i != -1)\n    return snippets[i]\n\n  popup(\n    'Snippet Not Found',\n    'No matching snippet found for \"' + snippetName + '\"!'\n  )\n  abort()\n}\n\nfunction getPlaceholders(snippet) {\n  var placeholders = {}\n  var m\n  var reVar = newVarRe('([^:}]*):?(.*?)')\n  while ((m = reVar.exec(snippet)) !== null) {\n    if (!(m[1] in placeholders))\n      placeholders[m[1]] = m[2].replace('\\\\n', '\\n')\n  }\n\n  return placeholders\n}\n\nfunction assignPlaceholders(text, values) {\n  if (!(values instanceof Object)) {\n    text = assignPlaceholder(text, '.*?', values)\n  } else {\n    for (var name in values)\n      text = assignPlaceholder(text, name, values[name])\n  }\n\n  return text\n}\n\nfunction askToAssignPlaceholders(snippet, format, values) {\n  var text = getText(snippet, format)\n  var placeholders = getPlaceholders(text)\n\n  if (Object.keys(placeholders).length < 1)\n    return\n\n  if (values) {\n    snippet[format] = assignPlaceholders(text, values)\n    return values\n  }\n\n  var label = escapeHtml(text)\n    .replace(newVarRe('([^:}]*).*?'), '<b>$1</b>')\n\n  var dialogVars = [\n    '.title', 'Set Snippet Values',\n    '.label', label\n  ]\n\n  for (var name in placeholders) {\n    var values = placeholders[name].split(',')\n    dialogVars.push(name)\n    dialogVars.push((values.length == 1) ? values[0] : values)\n  }\n\n  var values = dialog.apply(this, dialogVars) || abort()\n  snippet[format] = assignPlaceholders(text, values)\n  return values\n}\n\nfunction pasteSnippet(mime, content) {\n  copy(mime, content)\n  copySelection(mime, content)\n  paste()\n}\n\nvar snippetNames = []\nvar snippets = []\nloadSnippets(snippetNames, snippets)\n\nvar snippet = askForSnippet(snippetNames, snippets)\n\nvalues = askToAssignPlaceholders(snippet, mimeText)\naskToAssignPlaceholders(snippet, mimeHtml, values)\n\npasteSnippet(mimeItems, pack(snippet))"
6\Name=Replace in Selection
6\Command="copyq:\nconst useRegularExpression = false;\n\n// Copy without changing selection buffer on Linux\nfunction copyWithoutSelectionLinux() {\n  const copy_clipboard = config('copy_clipboard');\n  config('copy_clipboard', false);\n  try {\n    copy.apply(this, arguments);\n  } finally {\n    config('copy_clipboard', copy_clipboard);\n  }\n}\n\nconst copyWithoutSelection = info('platform').includes('Linux')\n    ? copyWithoutSelectionLinux : copy;\n\ncopyWithoutSelection();\nconst text = str(clipboard());\n\nconst r1 = '&Replace';\nconst r2 = '&With';\nconst wantRegex = 'Regular &Expression';\nconst reply = dialog(\n    '.title', 'Replace a Text',\n    r1, '', r2, '',\n    wantRegex, useRegularExpression);\n\nif (!reply) {\n  abort();\n}\n\nif (reply[wantRegex]) {\n  const regex = new RegExp(reply[r1], 'g');\n  const newText = text.replace(regex, reply[r2]);\n  copyWithoutSelection(newText);\n} else {\n  const newText = text.split(reply[r1]).join(reply[r2]);\n  copyWithoutSelection(newText);\n}\n\npaste();"
